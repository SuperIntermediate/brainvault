    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        margin: 0;
        background: #050714;
        font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      /* React root hidden until splash gone */
      #root {
        opacity: 0;
        transition: opacity 0.7s ease;
      }
      #root.bv-ready {
        opacity: 1;
        overflow: auto;
      }

      /* ══════════════════════════════════
         SPLASH SCREEN
      ══════════════════════════════════ */
      #bv-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #050714;
        transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1),
                    visibility 0.8s cubic-bezier(0.4,0,0.2,1);
      }
      #bv-splash.bv-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* ── Full-screen video ── */
      #bv-splash-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        opacity: 0;
        transition: opacity 0.8s ease;
      }
      #bv-splash-video.loaded { opacity: 0.85; }

      /* ── Animated gradient background (fallback + always shown under video) ── */
      #bv-bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 50% 40%, rgba(124,58,237,0.28) 0%, transparent 65%),
          radial-gradient(ellipse 50% 40% at 20% 80%, rgba(99,35,210,0.18) 0%, transparent 60%),
          radial-gradient(ellipse 40% 30% at 80% 20%, rgba(168,85,247,0.14) 0%, transparent 55%),
          linear-gradient(160deg, #080516 0%, #0a0820 40%, #050714 100%);
        animation: bv-bg-pulse 4s ease-in-out infinite alternate;
      }

      /* Subtle grid pattern overlay */
      #bv-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 80%);
        -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 80%);
      }

      /* ── CENTRE CONTENT ── */
      #bv-center {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        animation: bv-entrance 1s cubic-bezier(0.16,1,0.3,1) 0.15s both;
      }

      /* Logo image */
      #bv-logo {
        width: clamp(140px, 22vw, 220px);
        height: clamp(140px, 22vw, 220px);
        border-radius: clamp(28px, 4vw, 44px);
        object-fit: cover;
        margin-bottom: clamp(24px, 3vw, 36px);
        box-shadow:
          0 0 0 1px rgba(124,58,237,0.25),
          0 0 60px rgba(124,58,237,0.55),
          0 0 120px rgba(124,58,237,0.25),
          0 24px 60px rgba(0,0,0,0.7);
        animation: bv-logo-pulse 3s ease-in-out infinite alternate;
        filter: drop-shadow(0 0 30px rgba(124,58,237,0.6));
      }

      /* App name */
      #bv-title {
        font-size: clamp(36px, 7vw, 64px);
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -1px;
        line-height: 1;
        margin-bottom: 10px;
        text-align: center;
        background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #a855f7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 2px 20px rgba(124,58,237,0.5));
      }

      /* Subtitle */
      #bv-subtitle {
        font-size: clamp(13px, 2vw, 18px);
        font-weight: 500;
        color: rgba(196,181,253,0.65);
        letter-spacing: 0.8px;
        text-align: center;
        margin-bottom: clamp(32px, 5vw, 52px);
      }

      /* ── Loading indicator ── */
      #bv-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      /* Pill progress bar */
      #bv-bar-track {
        width: clamp(160px, 30vw, 260px);
        height: 4px;
        border-radius: 4px;
        background: rgba(124,58,237,0.15);
        overflow: hidden;
      }
      #bv-bar-fill {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, #4f1db5, #7c3aed, #a855f7, #e879f9);
        background-size: 300% 100%;
        animation:
          bv-progress 3.2s cubic-bezier(0.05,0.65,0.1,1) forwards,
          bv-sheen 2s linear infinite;
      }

      /* Loading text */
      #bv-loading-text {
        font-size: 12px;
        font-weight: 600;
        color: rgba(139,92,246,0.6);
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: bv-text-blink 1.6s ease-in-out infinite;
      }

      /* ── Floating orbs in background ── */
      .bv-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        animation: bv-orb-float linear infinite;
        pointer-events: none;
      }
      .bv-orb-1 {
        width: 350px; height: 350px;
        background: rgba(124,58,237,0.12);
        top: -80px; left: -80px;
        animation-duration: 18s;
        animation-name: bv-orb-float-1;
      }
      .bv-orb-2 {
        width: 280px; height: 280px;
        background: rgba(168,85,247,0.10);
        bottom: -60px; right: -60px;
        animation-duration: 22s;
        animation-name: bv-orb-float-2;
      }
      .bv-orb-3 {
        width: 200px; height: 200px;
        background: rgba(99,35,210,0.10);
        top: 40%; right: 5%;
        animation-duration: 15s;
        animation-name: bv-orb-float-1;
      }

      /* ══ Keyframes ══ */
      @keyframes bv-entrance {
        from { opacity:0; transform:translateY(30px) scale(0.95); }
        to   { opacity:1; transform:translateY(0)    scale(1);    }
      }
      @keyframes bv-logo-pulse {
        from { box-shadow: 0 0 0 1px rgba(124,58,237,0.25), 0 0 50px rgba(124,58,237,0.5), 0 0 100px rgba(124,58,237,0.2), 0 24px 60px rgba(0,0,0,0.7); }
        to   { box-shadow: 0 0 0 2px rgba(168,85,247,0.45), 0 0 80px rgba(168,85,247,0.75), 0 0 160px rgba(124,58,237,0.3), 0 24px 60px rgba(0,0,0,0.7); }
      }
      @keyframes bv-bg-pulse {
        from { opacity:0.8; }
        to   { opacity:1.0; }
      }
      @keyframes bv-progress {
        0%   { width:0%;   }
        15%  { width:22%;  }
        40%  { width:50%;  }
        65%  { width:73%;  }
        82%  { width:88%;  }
        100% { width:100%; }
      }
      @keyframes bv-sheen {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }
      @keyframes bv-text-blink {
        0%,100% { opacity:0.5; }
        50%     { opacity:1.0; }
      }
      @keyframes bv-orb-float-1 {
        0%,100% { transform:translate(0,0); }
        33%     { transform:translate(40px,-30px); }
        66%     { transform:translate(-20px,20px); }
      }
      @keyframes bv-orb-float-2 {
        0%,100% { transform:translate(0,0); }
        33%     { transform:translate(-30px,20px); }
        66%     { transform:translate(20px,-40px); }
      }
    </style>
  </head>

          vid.play().catch(function() { vid.style.display='none'; });
        });
      }

      // ── Dismiss logic ──────────────────────────────────────────────────
      var _bvStart = Date.now();
      var _bvMinMs = 3200; // matches bv-progress animation

      window.__bvHideSplash = function() {
        var elapsed   = Date.now() - _bvStart;
        var remaining = Math.max(0, _bvMinMs - elapsed);
        setTimeout(function() {
          var splash = document.getElementById('bv-splash');
          var root   = document.getElementById('root');
          if (splash) splash.classList.add('bv-hidden');
          if (root)   root.classList.add('bv-ready');
          setTimeout(function() {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
            document.body.style.overflow = '';
          }, 850);
        }, remaining);
      };

      // Safety net — hide after 8 s
      setTimeout(window.__bvHideSplash, 8000);
    </script>
  </body>
</html>
